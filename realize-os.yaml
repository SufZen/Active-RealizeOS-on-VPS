# ─────────────────────────────────────────────────────────────
# FEATURES
# ─────────────────────────────────────────────────────────────
features:
  review_pipeline: true
  auto_memory: true
  skills_v2: true
  proactive_mode: false
  cross_system: true
  evolution_engine: true
  evolution_gap_detection: true
  evolution_auto_apply: false     # safety default — requires explicit approval
  evolution_prompt_refine: true
  evolution_skill_suggest: true

# ─────────────────────────────────────────────────────────────
# LLM ROUTING — Multi-model strategy
# ─────────────────────────────────────────────────────────────
llm:
  default_model: claude-sonnet-4-6

  routing:
    # Fast, lightweight tasks — Q&A, lookups, short replies
    simple: gemini-flash

    # Content creation — writing, drafting, editing
    content: claude-sonnet-4-6

    # Strategy, analysis, complex reasoning
    strategy: claude-sonnet-4-6

    # Deep analysis, data synthesis, financial modeling
    complex: claude-opus-4-6

    # Code generation, system building, technical tasks
    code: claude-sonnet-4-6

    # Image generation tasks (route to image-capable models)
    image: gemini-pro-vision

    # Video understanding and generation
    video: veo-2

    # Data analysis, structured output, spreadsheets
    data: claude-opus-4-6

  # Per-system model overrides (optional)
  system_overrides:
    arena:
      complex: claude-opus-4-6   # Financial modeling needs best reasoning
    realizeos:
      code: claude-sonnet-4-6    # Code tasks always get Sonnet

# ─────────────────────────────────────────────────────────────
# CHANNELS
# ─────────────────────────────────────────────────────────────
channels:
  - type: api
    port: 8080

  - type: telegram
    name: sufz
    token: ${SUFZ_BOT_TOKEN}
    mode: super_agent
    description: "SufZ — super agent orchestrating the entire ecosystem"
    authorized_users: ${AUTHORIZED_USERS}
    # Forum topic thread_id → system_key (supergroup -1003692940105)
    topic_routing:
      2: realization
      3: realization-il
      6: burtucala
      7: arena
      8: realizeos
      9: personal
      10: personal-investments
      11: company-investments
      65: homeaid
      66: mioliving_partnership

  - type: telegram
    name: paulo
    token: ${PAULO_BOT_TOKEN}
    system_key: personal
    description: "Paulo — bureaucratic matters in Portugal across all ventures"
    authorized_users: ${AUTHORIZED_USERS}

# ─────────────────────────────────────────────────────────────
# VOICE — ElevenLabs Conversational AI + Twilio Outbound
# ─────────────────────────────────────────────────────────────
voice:
  enabled: true

  elevenlabs:
    api_key: ${ELEVENLABS_API_KEY}
    agent_id: ${ELEVENLABS_AGENT_ID}
    phone_number_id: ${ELEVENLABS_PHONE_NUMBER_ID}
    pt_voice_id: ${ELEVENLABS_PT_VOICE_ID}
    # Portuguese voice ID for calls to Portuguese entities

  twilio:
    account_sid: ${TWILIO_ACCOUNT_SID}
    auth_token: ${TWILIO_AUTH_TOKEN}
    phone_number: ${TWILIO_PHONE_NUMBER}
    # US-based number — used for outbound calls only
    pt_caller_phone: ${PT_CALLER_PHONE}
    # Portuguese caller ID — used for Portuguese-language calls to improve answer rates

  webhooks:
    # ElevenLabs posts call transcript here when call completes
    elevenlabs_post_call:
      path: /webhooks/elevenlabs
      system_key: personal
      secret: ${ELEVENLABS_WEBHOOK_SECRET}
      enabled: true
      message_template: |
        Call completed. Call ID: {call_id}. Duration: {duration_seconds}s. Status: {status}.
        Transcript: {transcript}
