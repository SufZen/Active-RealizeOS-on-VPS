name: pt_secretary
status: active
version: "2.1"
description: |
  Handles Portuguese bureaucracy tasks: calls, appointments, tax filings, renewals, and formal correspondence.
  Use when user needs to TAKE ACTION with Portuguese services (call, schedule, renew, file, pay, draft).
  Do NOT use for informational questions about Portugal (use portugal_lookup).
  Do NOT use for generic "how can you help" questions — route those to the agent instead.
system: personal
task_type: general
triggers:
  - call edp
  - call finanças
  - call financas
  - call segurança social
  - call aima
  - call sns
  - call irn
  - call epal
  - call nos
  - call meo
  - call vodafone
  - make a call to
  - phone call portugal
  - schedule appointment portugal
  - agendar atendimento
  - what deadlines
  - upcoming deadlines portugal
  - renew residency
  - change address portugal
  - alterar morada
  - efatura validate
  - validate invoices
  - irs declaration
  - file taxes portugal
  - imi property tax
  - iuc vehicle tax
  - pay tax portugal
  - loja do cidadão
  - write letter portuguese
  - draft email portuguese
  - formal letter portugal
  - cmd activation
  - chave móvel digital
negative_triggers:
  - portugal law
  - golden visa info
  - d7 visa info
  - how to in portugal
  - how can you help
  - what can you do
  - what services
  - your services
tools_required:
  - web_search
  - web_fetch
  - phone_call
pipeline: [portugal_life]
steps:
  # Step 1: Research current procedures
  - id: search
    type: tool
    action: web_search
    label: Searching current Portuguese procedures
    query_template: "{user_message} Portugal {today} official procedure"
    output_var: search_results

  # Step 2: Validate search succeeded
  - id: validate_search
    type: condition
    check: "{search_results}"
    branches:
      "Error": stop
      default: continue

  # Step 3: Read the top official source
  - id: read_source
    type: tool
    action: web_fetch
    label: Reading official source
    params:
      url: "{first_result_url}"
    output_var: page_content

  # Step 4: Synthesize a response with full context
  - id: synthesize
    type: agent
    agent: portugal_life
    label: PT-Secretary preparing response
    inject_context: [search_results, page_content]
    prompt: |
      You are pt-secretary, Asaf's Portuguese bureaucracy agent.

      The user asked: "{user_message}"

      Use the web research results to provide accurate, current information.

      Your response MUST include:
      1. Clear answer in English
      2. Step-by-step process (if applicable)
      3. Required documents
      4. Portal URL and phone number
      5. Key Portuguese phrases needed
      6. Any upcoming deadlines
      7. Practical tips and common pitfalls

      If the user explicitly asked to CALL a service:
      - Identify the correct phone number from the directory
      - Check if the service is currently open (business hours)
      - Prepare a clear task description for the AI voice agent
      - State that a phone_call will be initiated next and will require approval

      If this involves a form, explain each field in English.
      If this involves a deadline, flag urgency clearly.
    output_var: response

  # Step 4.5: Extract Call Variables (only if user explicitly asked to call)
  - id: extract_call_args
    type: agent
    agent: orchestrator
    label: Extracting call details
    condition: "call"
    condition_field: user_message
    output_format: json
    inject_context: [response]
    prompt: |
      The previous step generated a response about a Portuguese service. The user asked: "{user_message}".
      Please extract the following information into a strict JSON object:
      {
        "call_phone": "The phone number to call (e.g., '+351...')",
        "call_service": "The name of the service (e.g., 'Finanças')",
        "call_task": "A concise instruction of what to ask or do on the call",
        "call_language": "The language to use, usually 'pt-PT'"
      }
      If any info is missing, make your best guess based on the context. Only output the JSON block.

  # Step 5: Make a phone call — ONLY if user explicitly asked to call
  # The condition gate ensures this step is skipped when the user
  # message does not contain the word "call".
  - id: make_call
    type: tool
    action: phone_call
    label: Making phone call
    condition: "call"
    condition_field: user_message
    params:
      phone_number: "{call_phone}"
      service_name: "{call_service}"
      task_description: "{call_task}"
      language: "{call_language}"
    output_var: call_result
output_format: text
