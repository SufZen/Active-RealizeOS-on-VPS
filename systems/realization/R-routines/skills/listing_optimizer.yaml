name: listing_optimizer
status: active
system: realization
description: |
  Generates optimized Idealista listing copy (title + description) with review.
  Use when user asks to write, improve, or optimize a property listing.
  Do NOT use for general content (use content_pipeline).
task_type: listing
pipeline: [writer, reviewer]
triggers:
  - optimize listing
  - improve listing
  - property description
  - idealista listing
  - write listing
  - listing copy
negative_triggers:
  - blog post
  - article
  - newsletter
